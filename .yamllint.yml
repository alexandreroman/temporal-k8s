extends: default

# Vendir-managed upstream sources are exempt from
# lint: we do not own the formatting and reformatting
# would diverge from the release artifact. Ignoring
# the whole directory keeps future synced files
# exempt automatically.
ignore: |
  crds/cert-manager/upstream/
  crds/cloudnative-pg/upstream/
  crds/gateway-api/upstream/
  vendir.lock.yml

rules:
  line-length:
    max: 120
    level: error
  truthy:
    # "on:" is mandatory in GitHub Actions workflows; exclude
    # it from the truthy check rather than the workflow file.
    allowed-values: ["true", "false", "on"]
    check-keys: true
  comments:
    min-spaces-from-content: 1
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: true
