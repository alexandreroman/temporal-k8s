version: "3"

vars:
  CLUSTER_NAME: temporal

includes:
  kind:
    taskfile: ./bootstrap/kind
    # Run kind tasks from their own directory so
    # relative paths (e.g. kind-config.yaml) resolve
    # correctly.
    dir: ./bootstrap/kind

tasks:
  cluster-create:
    desc: Create the Kind cluster and deploy components
    cmds:
      - task: kind:default
      # Wait for Flux CD to finish deploying all
      # components (infra, temporal, apps).
      - task: flux-reconcile

  cluster-delete:
    desc: Delete the Kind cluster
    cmds:
      - task: kind:cluster-delete

  flux-reconcile:
    desc: Trigger a full Flux CD reconciliation
    cmds:
      # --with-source refreshes the GitRepository
      # before reconciling, so no separate source
      # reconcile step is needed.
      # --timeout accounts for Helm installs and
      # health checks that may take several minutes.
      - >-
        flux reconcile kustomization infra
        --with-source
        --timeout 10m
        --context kind-{{.CLUSTER_NAME}}
      - >-
        flux reconcile kustomization temporal
        --timeout 10m
        --context kind-{{.CLUSTER_NAME}}
      - >-
        flux reconcile kustomization apps
        --timeout 10m
        --context kind-{{.CLUSTER_NAME}}
