version: "3"

vars:
  CLUSTER_NAME: temporal

includes:
  kind:
    taskfile: ./bootstrap/kind
    # Run kind tasks from their own directory so
    # relative paths (e.g. kind-config.yaml) resolve
    # correctly.
    dir: ./bootstrap/kind

tasks:
  cluster-create:
    desc: Create the Kind cluster and deploy components
    cmds:
      - task: kind:default
      # Wait for Flux CD to finish deploying all
      # components (crds, infra, apps).
      - task: flux-reconcile

  cluster-delete:
    desc: Delete the Kind cluster
    cmds:
      - task: kind:cluster-delete

  vendir-sync:
    desc: Refresh vendir-managed upstream sources
    cmds:
      # vendir.yml lives at the repo root; this
      # rewrites every `directories` entry in place.
      - vendir sync

  flux-reconcile:
    desc: Trigger a full Flux CD reconciliation
    cmds:
      # Flux resolves dependsOn in cascade, so
      # reconciling apps triggers crds and infra
      # ahead of it. --with-source refreshes the
      # GitRepository first; --timeout covers
      # Helm installs and health checks that may
      # take several minutes end-to-end.
      - >-
        flux reconcile kustomization apps
        --with-source
        --timeout 15m
        --context kind-{{.CLUSTER_NAME}}
      # `flux reconcile kustomization` only waits for
      # manifests to apply, not for Helm installs to
      # finish. Block on every HelmRelease becoming
      # Ready so the task returns when the cluster is
      # fully usable end-to-end.
      - >-
        kubectl wait helmrelease --all --all-namespaces
        --for=condition=Ready
        --timeout=15m
        --context kind-{{.CLUSTER_NAME}}
