# Reconcile applications (hello, etc.) from the
# apps/ directory in the Git repository.
# Depends on addons so that Traefik CRDs are
# available before IngressRoute resources are
# applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: addons
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./apps
  prune: true
  timeout: 5m
  # Inject shared variables (e.g. base_domain)
  # into app manifests at deploy time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
