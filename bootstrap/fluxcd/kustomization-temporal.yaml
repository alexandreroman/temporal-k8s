# Reconcile Temporal components (server, database,
# worker controller) from the temporal/ directory.
# Depends on infra so that operator CRDs
# (e.g. CloudNativePG) are available before
# custom resources are applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: temporal
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./temporal
  prune: true
  timeout: 5m
  # Inject shared variables (e.g. base_domain)
  # into temporal manifests at deploy time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
