# Reconcile infrastructure components
# (operators, CRDs, etc.) from the infra/
# directory in the Git repository.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./infra
  prune: true
  timeout: 5m
  # Inject shared variables (e.g. base_domain)
  # into infra manifests at deploy time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
  # Wait for the CloudNativePG operator to be
  # fully ready (including its webhook) before
  # marking infra as Ready. Without this,
  # dependent kustomizations (apps) may fail
  # on dry-run because the CNPG validating/
  # mutating webhook is not yet serving.
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cloudnative-pg
      namespace: cloudnative-pg
