# Reconcile infrastructure components
# (operators, CRDs, etc.) from the infra/
# directory in the Git repository.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./infra
  prune: true
  timeout: 5m
