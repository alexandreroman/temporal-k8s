# Reconcile addons (Temporal, etc.) from the
# addons/ directory in the Git repository.
# Depends on infra so that operator CRDs
# (e.g. CloudNativePG) are available before
# custom resources are applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./addons
  prune: true
  timeout: 5m
  # Inject shared variables (e.g. base_domain)
  # into addon manifests at deploy time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
