# Reconcile cluster addons (Traefik, etc.) from
# the addons/ directory in the Git repository.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./addons
  prune: true
  timeout: 5m
