# Reconcile every CRD bundle (Gateway API, cert-manager,
# CloudNativePG, prometheus-operator, temporal worker
# controller) before any operator chart that depends on
# them. CRDs change rarely, so the interval is long.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: temporal-k8s
  path: ./crds
  prune: true
  timeout: 5m
