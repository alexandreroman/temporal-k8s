kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "127.0.0.1"
nodes:
  - role: control-plane
    # Default 15s HPA sync is the dominant fixed
    # delay in scale reactions; trim to 5s.
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        controllerManager:
          extraArgs:
            horizontal-pod-autoscaler-sync-period: 5s
  - role: worker
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
      # Expose Temporal gRPC on its standard
      # port so local apps can connect without
      # changing the default 7233 address.
      - containerPort: 30723
        hostPort: 7233
        protocol: TCP
      # Expose OpenTelemetry Collector HTTP
      # receiver on its standard port so local
      # apps can push telemetry to port 4318.
      - containerPort: 30418
        hostPort: 4318
        protocol: TCP
  - role: worker
  - role: worker
