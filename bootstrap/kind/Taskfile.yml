version: "3"

vars:
  CLUSTER_NAME: temporal
  KIND_CONFIG: kind-config.yaml
  FLUX_VERSION: "2.8.3"
  # Auto-detect container runtime:
  # prefer Docker, fall back to Podman.
  PROVIDER:
    sh: >-
      if docker info >/dev/null 2>&1; then
        echo docker;
      elif podman info >/dev/null 2>&1; then
        echo podman;
      else
        echo none;
      fi

env:
  # Kind uses Docker by default; the env var is
  # only needed when Podman is the provider.
  KIND_EXPERIMENTAL_PROVIDER: "{{.PROVIDER}}"

tasks:
  default:
    desc: Create the kind cluster
    aliases: [create]
    cmds:
      - task: preflight
      - task: cluster-create
      - task: cluster-ready
      - task: flux-install
      - task: flux-bootstrap

  preflight:
    desc: Verify required tools are installed
    silent: true
    preconditions:
      - sh: test "{{.PROVIDER}}" != "none"
        msg: >-
          No container runtime found.
          Install Docker or Podman first.
      - sh: command -v kind >/dev/null
        msg: "kind is not installed."
    cmds:
      - echo "Using container runtime {{.PROVIDER}}"

  cluster-create:
    desc: Create the kind cluster
    status:
      - kind get clusters | grep -q "^{{.CLUSTER_NAME}}$"
    cmds:
      - >-
        kind create cluster
        --name {{.CLUSTER_NAME}}
        --config {{.KIND_CONFIG}}
      # Default Podman PIDs limit (2048) is shared
      # across all pods on a node. Removing the cap
      # prevents OOM native-thread errors in JVM
      # workers with large thread pools.
      - >-
        {{.PROVIDER}} update --pids-limit -1
        {{.CLUSTER_NAME}}-worker
      - >-
        {{.PROVIDER}} update --pids-limit -1
        {{.CLUSTER_NAME}}-worker2
      - >-
        {{.PROVIDER}} update --pids-limit -1
        {{.CLUSTER_NAME}}-worker3

  cluster-ready:
    desc: Wait for the cluster to be ready
    cmds:
      - >-
        kubectl wait --for=condition=Ready
        nodes --all
        --timeout=120s
        --context kind-{{.CLUSTER_NAME}}

  flux-install:
    desc: Deploy Flux CD into the cluster
    cmds:
      - >-
        kubectl apply
        --context kind-{{.CLUSTER_NAME}}
        -f https://github.com/fluxcd/flux2/releases/download/v{{.FLUX_VERSION}}/install.yaml
      - >-
        kubectl wait --for=condition=Available
        deployments --all
        --namespace flux-system
        --timeout=120s
        --context kind-{{.CLUSTER_NAME}}

  flux-bootstrap:
    desc: Apply initial Flux CD configuration
    cmds:
      - >-
        kubectl apply
        --context kind-{{.CLUSTER_NAME}}
        -k ../fluxcd

  cluster-delete:
    desc: Delete the kind cluster
    cmds:
      - kind delete cluster --name {{.CLUSTER_NAME}}
