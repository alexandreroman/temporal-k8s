apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  # Auto-recover from transient install/upgrade
  # failures. On install, retry up to 3 times before
  # giving up. On upgrade, retry then rollback to
  # the last successful release.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  values:
    # CRDs are owned by the dedicated crds layer
    # (see crds/cert-manager/upstream/cert-manager.crds.yaml)
    # so HelmRelease re-installs do not touch CRD lifecycle.
    crds:
      enabled: false
