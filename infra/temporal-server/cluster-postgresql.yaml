# CloudNativePG Cluster for Temporal.
# The CNPG operator is deployed in the infra
# layer, which this layer depends on.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgresql
  namespace: temporal
spec:
  # PostgreSQL 16 is the version used in
  # Temporal's official docker-compose setup.
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  # Single instance is sufficient for local
  # development. No HA replicas needed.
  instances: 1
  # Test/dev only — keep PostgreSQL footprint
  # small so the pod schedules on a Kind worker.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      # Grant CREATEDB so Temporal schema jobs
      # can create the visibility database.
      postInitSQL:
        - ALTER USER temporal CREATEDB
