apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 1h
  # Wait for the CNPG operator to be ready before
  # creating the Cluster CR consumed by Temporal.
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg
  # First install on a fresh Kind cluster pulls
  # six Temporal images and runs the schema-init
  # Job in series, which routinely exceeds the
  # default 5m timeout. 15m gives image pulls and
  # schema migration enough headroom.
  # On install/upgrade failure, retry up to 3 times;
  # upgrade failures roll back to the last
  # successful release.
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: temporal
      version: "1.2.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
  values:
    server:
      replicaCount: 1
      config:
        persistence:
          defaultStore: default
          visibilityStore: visibility
          # Use a small number of history shards
          # for local dev (cannot be changed later).
          numHistoryShards: 4
          datastores:
            default:
              sql:
                pluginName: postgres12
                # Let Temporal schema jobs create
                # the database and run migrations.
                createDatabase: true
                manageSchema: true
                databaseName: temporal
                # CNPG exposes a read-write service
                # named <cluster>-rw.
                connectAddr: >-
                  temporal-postgresql-rw:5432
                connectProtocol: tcp
                user: temporal
                # Password read from the secret
                # auto-generated by CNPG operator.
                existingSecret: >-
                  temporal-postgresql-app
                secretKey: password
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
            visibility:
              sql:
                pluginName: postgres12
                createDatabase: true
                manageSchema: true
                databaseName: temporal_visibility
                connectAddr: >-
                  temporal-postgresql-rw:5432
                connectProtocol: tcp
                user: temporal
                existingSecret: >-
                  temporal-postgresql-app
                secretKey: password
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
        # Enable Prometheus metrics endpoint so
        # Prometheus can scrape Temporal services.
        metrics:
          prometheus:
            listenAddress: "0.0.0.0:9090"
        # Auto-create the default namespace
        # so Temporal is ready to use immediately.
        namespaces:
          create: true
          namespace:
            - name: default
              retention: 3d
      # Enable Prometheus annotations on pods so
      # the Prometheus server can auto-discover
      # Temporal services via pod annotations.
      metrics:
        annotations:
          enabled: true
        # ServiceMonitor is not supported by this
        # chart version; see podmonitor.yaml instead.
        serviceMonitor:
          enabled: false
      # Test/dev cluster only. Resource requests
      # are pinned low so every Temporal pod fits
      # on a Kind worker node alongside the
      # operator stack on a 16 GB host.
      frontend:
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
      history:
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            # 256Mi OOMKilled under load
            memory: 512Mi
      matching:
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
      worker:
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
    web:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
      additionalEnv:
        # Allow CSRF cookie over plain HTTP.
        # Required because the UI is accessed
        # without TLS in this test environment.
        - name: TEMPORAL_CSRF_COOKIE_INSECURE
          value: "true"
    admintools:
      enabled: true
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
