# Lightweight Prometheus deployment for local dev.
# Alertmanager, pushgateway, and persistent storage
# are disabled to save resources.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      version: "28.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    # Alertmanager is not needed in a test
    # environment.
    alertmanager:
      enabled: false
    # Pushgateway is not needed; Temporal exposes
    # a pull-based /metrics endpoint.
    prometheus-pushgateway:
      enabled: false
    # kube-state-metrics is not needed; we only
    # care about Temporal metrics here.
    kube-state-metrics:
      enabled: false
    # Disable the node-exporter to keep the
    # footprint small on local dev.
    prometheus-node-exporter:
      enabled: false
    server:
      # No persistent storage for test/dev.
      persistentVolume:
        enabled: false
      # Short retention for local dev.
      retention: "3d"
