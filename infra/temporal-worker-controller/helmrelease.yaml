# Temporal Worker Controller automates safe
# Kubernetes deployments for Temporal workers
# using Worker Versioning.
# Requires cert-manager for webhook TLS.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal-worker-controller
  namespace: temporal-worker-controller
spec:
  interval: 1h
  # cert-manager provides webhook TLS certs.
  # CRDs are guaranteed by the dedicated crds layer.
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  # Auto-recover from transient install/upgrade
  # failures. On install, retry up to 3 times before
  # giving up. On upgrade, retry then rollback to
  # the last successful release.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: temporal-worker-controller
      # Chart version differs from appVersion:
      # chart 0.24.x = app 1.5.x.
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
  values:
    # Single replica for local dev.
    replicas: 1
    # cert-manager is already deployed in the
    # infra layer; no need to install it again.
    certmanager:
      install: false
      enabled: true
