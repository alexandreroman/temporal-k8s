# CRDs are shipped as a separate Helm chart
# and must be installed before the controller.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal-worker-controller-crds
  namespace: temporal-worker-controller
spec:
  interval: 1h
  chart:
    spec:
      chart: temporal-worker-controller-crds
      # Chart version differs from appVersion:
      # chart 0.24.x = app 1.5.x.
      version: "0.24.*"
      sourceRef:
        kind: HelmRepository
        name: temporal
