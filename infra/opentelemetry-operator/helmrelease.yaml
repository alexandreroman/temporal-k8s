# OpenTelemetry Operator manages
# OpenTelemetryCollector and Instrumentation
# custom resources declaratively.
# Requires cert-manager for webhook TLS.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: opentelemetry-operator
spec:
  interval: 1h
  # Wait for cert-manager to be ready before
  # installing, as the operator webhook
  # certificates depend on it.
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: opentelemetry-operator
      version: "0.109.*"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
  values:
    # Single replica for local dev.
    replicaCount: 1
    manager:
      # Use the contrib collector image by default
      # so custom resources created by the operator
      # include exporters like prometheusremotewrite.
      collectorImage:
        repository: >-
          otel/opentelemetry-collector-contrib
    # Admission webhooks require cert-manager,
    # which is already deployed in the infra layer.
    admissionWebhooks:
      certManager:
        enabled: true
