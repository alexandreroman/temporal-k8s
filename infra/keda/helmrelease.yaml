# KEDA (Kubernetes Event-Driven Autoscaler) scales
# workloads based on external metrics. Unlike the
# native HPA + prometheus-adapter combo, KEDA can
# patch spec.replicas on any resource that has that
# field, without requiring the /scale subresource.
# This makes it suitable for scaling custom resources
# like TemporalWorkerDeployment.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: keda
      version: "2.19.*"
      sourceRef:
        kind: HelmRepository
        name: kedacore
