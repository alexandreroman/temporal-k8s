# prometheus-adapter exposes Prometheus metrics as
# Kubernetes custom metrics (custom.metrics.k8s.io),
# so that HPAs can scale workloads based on
# application-level metrics collected by Prometheus.
#
# The HelmRepository "prometheus-community" already
# exists in the monitoring namespace (shared with
# kube-prometheus-stack).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-adapter
      version: "5.3.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    prometheus:
      # Use the stable service alias defined in
      # kube-prometheus-stack/service-prometheus.yaml
      url: http://prometheus.monitoring
      port: 9090
