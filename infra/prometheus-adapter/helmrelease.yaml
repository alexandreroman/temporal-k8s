# Prometheus Adapter exposes Prometheus metrics
# through the Kubernetes custom metrics API,
# enabling HPA to scale workloads based on
# application-specific metrics (e.g. Temporal
# task queue depth).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-adapter
      version: "5.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    prometheus:
      # Point to the Prometheus service deployed
      # by kube-prometheus-stack.
      url: http://prometheus.monitoring
      port: 9090
