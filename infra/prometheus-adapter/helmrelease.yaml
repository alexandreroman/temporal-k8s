# prometheus-adapter exposes Prometheus recording rules
# as Kubernetes external metrics for HPA autoscaling.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
  namespace: monitoring
spec:
  interval: 1h
  # Wait for Prometheus to be ready: the adapter
  # queries it at startup to validate rules.
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  chart:
    spec:
      chart: prometheus-adapter
      version: "5.3.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    prometheus:
      url: http://prometheus.monitoring
      port: 9090
    # Must be comfortably larger than the recording-rule
    # evaluation period (5s, see temporal-server/
    # prometheus-rules.yaml). The adapter queries
    # /api/v1/series over a now-<interval> window; if too
    # narrow, samples are missed and the external metric
    # flickers, leaving HPA with <unknown>.
    metricsRelistInterval: 30s
    # Decoupled from relistInterval: caps the staleness
    # of values returned to HPA. Must stay >= 2x the
    # recording-rule period (5s) on Prometheus 3.x.
    extraArguments:
      - --metrics-max-age=10s
    rules:
      external:
        # Total task queue backlog (global, all
        # versions). Primary HPA scaling signal.
        - seriesQuery: temporal_task_queue_backlog
          metricsQuery: sum(<<.Series>>)
          name:
            as: temporal_task_queue_backlog
          resources:
            namespaced: false
        # Per-version worker slot usage.
        # The Worker Controller injects matchLabels
        # into each versioned HPA; LabelMatchers
        # passes them through for filtering.
        - seriesQuery: >-
            temporal_worker_slots_used_by_version
          metricsQuery: >-
            <<.Series>>{<<.LabelMatchers>>}
          name:
            as: temporal_worker_slots_used_by_version
          resources:
            namespaced: false
