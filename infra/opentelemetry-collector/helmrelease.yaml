# Standalone OpenTelemetry Collector deployed via
# Helm chart (no operator required). Receives OTLP
# telemetry and pushes metrics to Prometheus via
# remote write.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: opentelemetry
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.147.*"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
  values:
    # Deployment mode is sufficient for a single
    # collector instance in a test environment.
    fullnameOverride: otel-collector
    mode: deployment
    replicaCount: 1
    # Use the contrib image to get exporters like
    # prometheusremotewrite.
    image:
      repository: >-
        otel/opentelemetry-collector-contrib
    command:
      name: otelcol-contrib
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
            http:
              endpoint: ${env:MY_POD_IP}:4318
      processors:
        batch:
          # Batch metrics before sending to reduce
          # the number of remote write requests.
          timeout: 5s
          send_batch_size: 1024
      exporters:
        prometheusremotewrite:
          # Push metrics to Prometheus via its
          # remote write endpoint.
          endpoint: >-
            http://prometheus-server.prometheus:80/api/v1/write
      extensions:
        health_check:
          endpoint: ${env:MY_POD_IP}:13133
      service:
        extensions:
          - health_check
        pipelines:
          metrics:
            receivers:
              - otlp
            processors:
              - batch
            exporters:
              - prometheusremotewrite
