apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  # Auto-recover from transient install/upgrade
  # failures. On install, retry up to 3 times before
  # giving up. On upgrade, retry then rollback to
  # the last successful release.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: traefik
      version: "39.0.8"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    # Use NodePort so traffic from Kind
    # extraPortMappings reaches Traefik on
    # worker nodes.
    service:
      type: NodePort
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
      # Dedicated gRPC entrypoint for Temporal.
      # Traefik listens on port 9233 internally,
      # exposed as NodePort 30723 (mapped to
      # host port 7233 by Kind).
      grpc:
        port: 9233
        expose:
          default: true
        protocol: TCP
        nodePort: 30723
      # Dedicated entrypoint for OpenTelemetry
      # Collector HTTP receiver. Traefik listens
      # on port 4318 internally, exposed as
      # NodePort 30418 (mapped to host port 4318
      # by Kind).
      otel:
        port: 4318
        expose:
          default: true
        protocol: TCP
        nodePort: 30418
    # Enable Kubernetes Gateway API provider
    # so HTTPRoute resources are processed
    # instead of Traefik-specific IngressRoute.
    providers:
      kubernetesGateway:
        enabled: true
    # Disable the chart-managed Gateway so we
    # can define our own with full control over
    # allowedRoutes (the chart does not expose
    # allowedRoutes.kinds in its values).
    gateway:
      enabled: false
    gatewayClass:
      enabled: true
    # Disable sending anonymous usage data.
    global:
      sendAnonymousUsage: false
