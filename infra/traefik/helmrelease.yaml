apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.*"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    # Use NodePort so traffic from Kind
    # extraPortMappings reaches Traefik on
    # worker nodes.
    service:
      type: NodePort
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
      # Dedicated gRPC entrypoint for Temporal.
      # Traefik listens on port 9233 internally,
      # exposed as NodePort 30723 (mapped to
      # host port 7233 by Kind).
      grpc:
        port: 9233
        protocol: TCP
        nodePort: 30723
    # Enable Kubernetes Gateway API provider
    # so HTTPRoute resources are processed
    # instead of Traefik-specific IngressRoute.
    providers:
      kubernetesGateway:
        enabled: true
    # Disable the chart-managed Gateway so we
    # can define our own with full control over
    # allowedRoutes (the chart does not expose
    # allowedRoutes.kinds in its values).
    gateway:
      enabled: false
    gatewayClass:
      enabled: true
    # Disable sending anonymous usage data.
    global:
      sendAnonymousUsage: false
