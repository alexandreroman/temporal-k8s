apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.*"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  values:
    # Install CRDs as part of the Helm release
    # so they are managed by Flux CD lifecycle.
    crds:
      create: true
