# Install the standard Gateway API CRDs.
# Required before any Gateway or HTTPRoute
# resource can be created.
#
# upstream/ is managed by vendir (do not hand-edit).
# The source-of-truth lives in vendir.yml at the repo
# root; refresh with `task vendir-sync`. Vendoring
# avoids hitting GitHub on every kustomize-controller
# reconcile and gives offline reproducibility.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - upstream
