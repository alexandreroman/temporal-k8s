# CRDs are shipped as a separate Helm chart and
# are owned by the dedicated crds layer so the
# controller release in infra/ can re-install
# without touching CRD lifecycle.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal-worker-controller-crds
  namespace: flux-system
spec:
  interval: 1h
  # Auto-recover from transient install/upgrade
  # failures. On install, retry up to 3 times before
  # giving up. On upgrade, retry then rollback to
  # the last successful release.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: temporal-worker-controller-crds
      # Chart version differs from appVersion:
      # chart 0.25.x = app 1.6.x.
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
