# CloudNativePG CRDs are installed out of band from
# the operator source tree so they are owned by the
# dedicated crds layer. The CNPG Helm chart in
# infra/ runs with crds.create=false.
#
# upstream/ is managed by vendir (do not hand-edit).
# The source-of-truth lives in vendir.yml at the repo
# root; refresh with `task vendir-sync`. Vendoring
# avoids hitting GitHub on every kustomize-controller
# reconcile and gives offline reproducibility.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - upstream
