# Dedicated chart that ships only the
# kube-prometheus-stack CRDs (PodMonitor,
# ServiceMonitor, PrometheusRule, …). Lets the
# main kube-prometheus-stack release in infra/
# omit CRD management.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  interval: 1h
  # Auto-recover from transient install/upgrade
  # failures. On install, retry up to 3 times before
  # giving up. On upgrade, retry then rollback to
  # the last successful release.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  chart:
    spec:
      chart: prometheus-operator-crds
      # Major version aligned with the operator
      # generation shipped by kube-prometheus-stack
      # 82.* in infra/.
      version: "28.0.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
