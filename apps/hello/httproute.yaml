# HTTPRoute using Kubernetes Gateway API to
# expose the hello app via Traefik. Routes all
# traffic on the root path to the hello service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello
  namespace: hello
spec:
  parentRefs:
    # Reference the Gateway auto-created by
    # Traefik in its own namespace.
    - name: traefik-gateway
      namespace: traefik
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello
          port: 80
