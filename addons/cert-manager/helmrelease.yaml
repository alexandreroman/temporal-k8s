apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.*"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  values:
    # Install CRDs as part of the Helm release
    # so they are managed by Flux CD lifecycle.
    crds:
      enabled: true
