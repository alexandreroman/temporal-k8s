# OpenTelemetryCollector CR managed by the
# OTel Operator. Receives metrics via OTLP and
# pushes them to Prometheus using remote write.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: opentelemetry-collector
spec:
  # Deployment mode is sufficient for a single
  # collector instance in a test environment.
  mode: deployment
  replicas: 1
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        # Batch metrics before sending to reduce
        # the number of remote write requests.
        timeout: 5s
        send_batch_size: 1024
    exporters:
      prometheusremotewrite:
        # Push metrics to Prometheus via its
        # remote write endpoint.
        endpoint: >-
          http://prometheus-server.prometheus:80/api/v1/write
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - prometheusremotewrite
