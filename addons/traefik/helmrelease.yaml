apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.*"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    # Use NodePort so traffic from Kind
    # extraPortMappings reaches Traefik on
    # worker nodes.
    service:
      type: NodePort
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
    # Enable Kubernetes Gateway API provider
    # so HTTPRoute resources are processed
    # instead of Traefik-specific IngressRoute.
    providers:
      kubernetesGateway:
        enabled: true
    # Deploy a default Gateway that accepts
    # routes from any namespace, so apps in
    # other namespaces can reference it.
    gateway:
      enabled: true
      listeners:
        web:
          # Allow HTTPRoutes from all namespaces,
          # not just the traefik namespace.
          # Chart v37+ expects an object matching
          # the Gateway API AllowedRoutes spec.
          namespacePolicy:
            from: All
    gatewayClass:
      enabled: true
    # Disable sending anonymous usage data.
    global:
      sendAnonymousUsage: false
