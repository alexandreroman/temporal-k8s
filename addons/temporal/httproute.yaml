# HTTPRoute using Kubernetes Gateway API to
# expose the Temporal Web UI via Traefik.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: temporal-web
  namespace: temporal
spec:
  parentRefs:
    # Reference the Gateway auto-created by
    # Traefik in its own namespace.
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "temporal.${base_domain}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: temporal-web
          port: 8080
