# GRPCRoute using Kubernetes Gateway API to
# expose the Temporal Frontend gRPC service
# via Traefik. Workers and CLI tools connect
# to temporal.${base_domain}:7233.
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: temporal-frontend
  namespace: temporal
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: grpc
  hostnames:
    - "temporal.${base_domain}"
  rules:
    - backendRefs:
        # Use the h2c service alias so Traefik
        # recognizes this as a gRPC backend.
        - name: temporal-frontend-grpc
          port: 7233
