# GRPCRoute using Kubernetes Gateway API to
# expose the Temporal Frontend gRPC service
# via Traefik on the same hostname as the
# Web UI. Workers and CLI tools can connect
# to temporal-api.${base_domain}:80 using h2c.
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: temporal-frontend
  namespace: temporal
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "temporal-api.${base_domain}"
  rules:
    - backendRefs:
        # Use the h2c service alias so Traefik
        # recognizes this as a gRPC backend.
        - name: temporal-frontend-grpc
          port: 7233
