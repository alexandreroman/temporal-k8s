apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 1h
  chart:
    spec:
      chart: temporal
      version: "1.0.0-rc.3"
      sourceRef:
        kind: HelmRepository
        name: temporal
  values:
    server:
      replicaCount: 1
      config:
        persistence:
          defaultStore: default
          visibilityStore: visibility
          # Use a small number of history shards
          # for local dev (cannot be changed later).
          numHistoryShards: 4
          datastores:
            default:
              sql:
                pluginName: postgres12
                # Let Temporal schema jobs create
                # the database and run migrations.
                createDatabase: true
                manageSchema: true
                databaseName: temporal
                # CNPG exposes a read-write service
                # named <cluster>-rw.
                connectAddr: >-
                  temporal-postgresql-rw:5432
                connectProtocol: tcp
                user: temporal
                # Password read from the secret
                # auto-generated by CNPG operator.
                existingSecret: >-
                  temporal-postgresql-app
                secretKey: password
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
            visibility:
              sql:
                pluginName: postgres12
                createDatabase: true
                manageSchema: true
                databaseName: temporal_visibility
                connectAddr: >-
                  temporal-postgresql-rw:5432
                connectProtocol: tcp
                user: temporal
                existingSecret: >-
                  temporal-postgresql-app
                secretKey: password
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
        # Enable Prometheus metrics endpoint so
        # Prometheus can scrape Temporal services.
        metrics:
          prometheus:
            listenAddress: "0.0.0.0:9090"
        # Auto-create the default namespace
        # so Temporal is ready to use immediately.
        namespaces:
          create: true
          namespace:
            - name: default
              retention: 3d
      # Enable Prometheus annotations on pods so
      # the Prometheus server can auto-discover
      # Temporal services via pod annotations.
      metrics:
        annotations:
          enabled: true
        serviceMonitor:
          enabled: false
      # Single replica per service for local dev.
      frontend:
        replicaCount: 1
      history:
        replicaCount: 1
      matching:
        replicaCount: 1
      worker:
        replicaCount: 1
    web:
      enabled: true
      replicaCount: 1
      additionalEnv:
        # Allow CSRF cookie over plain HTTP.
        # Required because the UI is accessed
        # without TLS in this test environment.
        - name: TEMPORAL_CSRF_COOKIE_INSECURE
          value: "true"
    admintools:
      enabled: true
