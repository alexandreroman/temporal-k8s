apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-recording-rules
  namespace: temporal
  labels:
    # Required for kube-prometheus-stack to
    # pick up this PrometheusRule.
    release: kube-prometheus-stack
spec:
  groups:
    - name: temporal.autoscaling
      interval: 10s
      rules:
        # Per-version slot usage, summed across worker
        # types (Workflow, Activity) and pod instances.
        # Exposed as a Kubernetes external metric
        # by prometheus-adapter.
        - record: temporal_worker_slots_used_by_version
          expr: >-
            sum by (
              temporal_worker_deployment_name,
              temporal_worker_build_id,
              temporal_namespace
            ) (temporal_worker_task_slots_used)
